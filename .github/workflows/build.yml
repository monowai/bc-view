name: Build and Package

# NOTE: The "test" job below is the gating signal for Renovate auto-merge.
# It must be configured as a required status check in branch protection on main
# so that dependency PRs cannot merge with failing tests. Without this, Renovate
# automerge will land breaking lockfile updates (see #614 for an example).

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_image:
        description: "Build and publish docker image"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "24"
  CONTAINER_REGISTRY: ghcr.io
  CONTAINER_ORG: monowai
  IMAGE_NAME: bc-view

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile --prefer-offline --network-concurrency 8

      - name: Restore Jest cache
        uses: actions/cache@v5
        with:
          path: .jest-cache
          key: jest-cache-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            jest-cache-

      - name: Run tests
        run: yarn test

      - name: Upload coverage to Codacy
        if: false
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
          CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
        run: |
          if [ -n "$CODACY_PROJECT_TOKEN" ]; then
            echo "Uploading coverage to Codacy using project token..."
            bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r coverage/lcov.info
            echo "✅ Coverage uploaded successfully"
          elif [ -n "$CODACY_API_TOKEN" ]; then
            echo "Uploading coverage to Codacy using API token..."
            export CODACY_ORGANIZATION_PROVIDER=gh
            export CODACY_USERNAME=monowai
            export CODACY_PROJECT_NAME=bc-view
            bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r coverage/lcov.info
            echo "✅ Coverage uploaded successfully"
          else
            echo "⚠️  No Codacy token set, skipping coverage upload"
          fi

  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile --prefer-offline --network-concurrency 8

      # Key structure: nextjs-cache-<workflow-hash>-<deps-hash>
      # Including hashFiles('src/**/*') in the key minted a fresh ~100 MB cache on every
      # source commit and blew past the repo cache budget. .next/cache is designed to
      # restore stale — Next handles incremental compilation from there.
      #
      # Workflow hash comes FIRST so the restore-keys fallback is anchored to it: a
      # change to .github/workflows/build.yml (env vars, secret references, build flags)
      # produces a new workflow hash, so the restore-keys prefix never matches a cache
      # built under the previous workflow. Without this anchoring, .next/cache can pin
      # a stale compiled version of process.env.NEXT_PUBLIC_* values — observed on
      # 2026-06-04 when a chunk built BEFORE the Sentry DSN secret existed was reused
      # AFTER the secret was added, leaving the browser bundle with an undefined DSN.
      # Routine yarn.lock / next.config.js changes still benefit from partial restore.
      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-cache-${{ hashFiles('.github/workflows/build.yml') }}-${{ hashFiles('yarn.lock', 'next.config.js') }}
          restore-keys: |
            nextjs-cache-${{ hashFiles('.github/workflows/build.yml') }}-

      - name: Verify Sentry DSN secret is present
        env:
          DSN_PRESENT: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN != '' }}
        run: |
          if [ "$DSN_PRESENT" != "true" ]; then
            echo "::error::NEXT_PUBLIC_SENTRY_DSN repo secret is missing or empty."
            echo "Browser-side Sentry will silently bail out — no pageload traces."
            echo "Add the secret at: https://github.com/monowai/bc-view/settings/secrets/actions"
            exit 1
          fi
          echo "NEXT_PUBLIC_SENTRY_DSN secret is set."

      - name: Build application
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          CI: true
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          # Days the cached registration check survives in localStorage before
          # the browser revalidates against /api/register. Set via repo Variable
          # (Settings → Variables), defaults to 30 if unset.
          NEXT_PUBLIC_REGISTRATION_TTL_DAYS: ${{ vars.NEXT_PUBLIC_REGISTRATION_TTL_DAYS || '30' }}
          # Browser trace sample rate. Empty by default → the client derives a
          # per-environment default (local 1.0 / deployed 0.2). Set repo Variable
          # to override (e.g. 1.0 to debug deployed tracing).
          NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE }}
        run: yarn build

      - name: Verify Sentry DSN is inlined into client bundle
        env:
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
        run: |
          # Extract Sentry project ID (last path segment) and ingest host. Checking BOTH
          # catches the case where a DSN was rotated to a different region (us → de) or
          # public key, but the same project ID was reused — project-ID-only grep would
          # false-pass while the bundle pointed at the wrong host. Both are public
          # identifiers, safe to grep / echo.
          PROJECT_ID="${NEXT_PUBLIC_SENTRY_DSN##*/}"
          DSN_HOST="${NEXT_PUBLIC_SENTRY_DSN#*://}"
          DSN_HOST="${DSN_HOST#*@}"
          DSN_HOST="${DSN_HOST%%/*}"
          if [ -z "$PROJECT_ID" ] || [ -z "$DSN_HOST" ]; then
            echo "::error::Could not parse NEXT_PUBLIC_SENTRY_DSN (project_id=$PROJECT_ID host=$DSN_HOST)."
            exit 1
          fi
          # Find the chunk that actually runs instrumentation-client.ts — that's the one
          # that has to reference the DSN. Greping all of .next/static/chunks is too
          # lenient: a build could have the DSN in some unrelated chunk while the
          # init module still inlined `undefined` (this happened on 2026-06-04).
          CHUNK=$(grep -lrF "instrumentation-client.ts loading" .next/static/chunks 2>/dev/null | head -1)
          if [ -z "$CHUNK" ]; then
            echo "::error::Could not locate the instrumentation-client chunk in .next/static/chunks."
            echo "If instrumentation-client.ts was renamed, update this guard."
            exit 1
          fi
          if grep -qF "$PROJECT_ID" "$CHUNK" && grep -qF "$DSN_HOST" "$CHUNK"; then
            echo "Sentry DSN inlined into $CHUNK (project_id=$PROJECT_ID host=$DSN_HOST)"
          else
            echo "::error::Sentry DSN NOT fully inlined in $CHUNK (project_id=$PROJECT_ID host=$DSN_HOST) — browser tracing would be dead."
            echo "Next.js did not inline the expected NEXT_PUBLIC_SENTRY_DSN into the instrumentation chunk despite the env var being set at build time."
            echo "Likely cause: Turbopack persistent cache reused a pre-compiled module with the old (undefined or rotated) DSN value."
            echo "Fix: invalidate .next/cache (delete the relevant Actions cache, then re-run)."
            exit 1
          fi

      # Artifact handoff to the docker job — gated on the same condition as the
      # docker job itself so PR builds (where docker doesn't run) don't pay any
      # storage cost. include-hidden-files: true is REQUIRED — without it,
      # actions/upload-artifact@v6 silently drops .next/ (dot-prefixed paths are
      # treated as "hidden") and the Docker job's "use pre-built .next" branch
      # falls into the rebuild path. The Dockerfile's post-build DSN guard runs
      # against the final .next regardless of which path produced it, so this
      # cannot silently regress.
      - name: Upload build artifacts
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.build_image)
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          path: |
            .next/
            public/
            package.json
            yarn.lock
          retention-days: 1
          include-hidden-files: true

  docker:
    name: Build Docker (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [test, build]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_image)
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-output

      # Catch silent artifact regressions early — if .next or node_modules
      # is missing, the Dockerfile falls into the rebuild path which is OK
      # but slower than the handoff. This step turns a perf regression into
      # a visible warning rather than letting it go unnoticed.
      - name: Report artifact contents
        run: |
          for d in .next node_modules; do
            if [ -d "$d" ] && [ -n "$(ls -A "$d" 2>/dev/null)" ]; then
              echo "$d present ($(du -sh "$d" | cut -f1)) — Dockerfile will reuse."
            else
              echo "::warning::$d missing or empty — Dockerfile will rebuild it (slower)."
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Prepare build metadata
        id: prep
        run: |
          PLATFORM_TAG=$(echo "${{ matrix.platform }}" | sed 's/\//-/g')
          SHORT_SHA=${GITHUB_SHA::7}
          echo "platform_tag=$PLATFORM_TAG" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.CONTAINER_REGISTRY }}/${{ env.CONTAINER_ORG }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}-${{ steps.prep.outputs.platform_tag }}
          labels: |
            org.opencontainers.image.build-number=${{ github.run_number }}
          # NEXT_PUBLIC_SENTRY_DSN is inlined into the client bundle at build
          # time — must be passed here so the Docker `yarn build` produces a
          # chunk with the DSN embedded. Without it the browser SDK silently
          # bails out and no pageload traces reach Sentry.
          build-args: |
            GIT_BRANCH=${{ github.ref_name }}
            GIT_COMMIT=${{ steps.prep.outputs.short_sha }}
            BUILD_ID=${{ github.run_number }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_REGISTRATION_TTL_DAYS=${{ vars.NEXT_PUBLIC_REGISTRATION_TTL_DAYS || '30' }}
            NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE=${{ vars.NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          # mode=min stores only final-stage layers, not every intermediate
          # builder layer. mode=max ballooned the GHA cache pool.
          cache-to: type=gha,scope=${{ matrix.platform }},mode=min
          provenance: false

  docker-manifest:
    name: Create Multi-arch Manifest
    runs-on: ubuntu-latest
    needs: docker
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_image)
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Create and push manifest
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          IMAGE="${{ env.CONTAINER_REGISTRY }}/${{ env.CONTAINER_ORG }}/${{ env.IMAGE_NAME }}"

          # Create manifest for versioned tag
          docker manifest create ${IMAGE}:${{ github.run_number }} \
            ${IMAGE}:${{ github.run_number }}-linux-amd64 \
            ${IMAGE}:${{ github.run_number }}-linux-arm64
          docker manifest push ${IMAGE}:${{ github.run_number }}

          # Only tag :latest from main so branch builds don't clobber the deployed tag
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            docker manifest create ${IMAGE}:latest \
              ${IMAGE}:${{ github.run_number }}-linux-amd64 \
              ${IMAGE}:${{ github.run_number }}-linux-arm64
            docker manifest push ${IMAGE}:latest
          fi

      - name: Output image tags
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Multi-arch Images (amd64 + arm64):**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ env.CONTAINER_REGISTRY }}/${{ env.CONTAINER_ORG }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "${{ env.CONTAINER_REGISTRY }}/${{ env.CONTAINER_ORG }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
