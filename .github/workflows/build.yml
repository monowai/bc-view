name: Build and Package

# NOTE: The "test" job below is the gating signal for Renovate auto-merge.
# It must be configured as a required status check in branch protection on main
# so that dependency PRs cannot merge with failing tests. Without this, Renovate
# automerge will land breaking lockfile updates (see #614 for an example).

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_image:
        description: "Build and publish docker image"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "24"
  CONTAINER_REGISTRY: ghcr.io
  CONTAINER_ORG: monowai
  IMAGE_NAME: bc-view

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile --prefer-offline --network-concurrency 8

      - name: Restore Jest cache
        uses: actions/cache@v4
        with:
          path: .jest-cache
          key: jest-cache-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            jest-cache-

      - name: Run tests
        run: yarn test

      - name: Upload coverage to Codacy
        if: false
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
          CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
        run: |
          if [ -n "$CODACY_PROJECT_TOKEN" ]; then
            echo "Uploading coverage to Codacy using project token..."
            bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r coverage/lcov.info
            echo "✅ Coverage uploaded successfully"
          elif [ -n "$CODACY_API_TOKEN" ]; then
            echo "Uploading coverage to Codacy using API token..."
            export CODACY_ORGANIZATION_PROVIDER=gh
            export CODACY_USERNAME=monowai
            export CODACY_PROJECT_NAME=bc-view
            bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r coverage/lcov.info
            echo "✅ Coverage uploaded successfully"
          else
            echo "⚠️  No Codacy token set, skipping coverage upload"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            junit.xml
          retention-days: 7

  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile --prefer-offline --network-concurrency 8

      # Key on lockfile + next.config only. Including hashFiles('src/**/*') in
      # the key minted a fresh ~100 MB cache on every source commit and blew
      # past the repo cache budget. .next/cache is designed to restore stale —
      # Next handles incremental compilation from there.
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-cache-${{ hashFiles('yarn.lock', 'next.config.js') }}
          restore-keys: |
            nextjs-cache-

      - name: Build application
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          CI: true
        run: yarn build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next/
            public/
            package.json
            yarn.lock
          retention-days: 1

  docker:
    name: Build Docker (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [test, build]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_image)
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Prepare build metadata
        id: prep
        run: |
          PLATFORM_TAG=$(echo "${{ matrix.platform }}" | sed 's/\//-/g')
          SHORT_SHA=${GITHUB_SHA::7}
          echo "platform_tag=$PLATFORM_TAG" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.CONTAINER_REGISTRY }}/${{ env.CONTAINER_ORG }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}-${{ steps.prep.outputs.platform_tag }}
          labels: |
            org.opencontainers.image.build-number=${{ github.run_number }}
          build-args: |
            GIT_BRANCH=${{ github.ref_name }}
            GIT_COMMIT=${{ steps.prep.outputs.short_sha }}
            BUILD_ID=${{ github.run_number }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          # mode=min stores only final-stage layers, not every intermediate
          # builder layer. mode=max ballooned the GHA cache pool.
          cache-to: type=gha,scope=${{ matrix.platform }},mode=min
          provenance: false

  docker-manifest:
    name: Create Multi-arch Manifest
    runs-on: ubuntu-latest
    needs: docker
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_image)
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Create and push manifest
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          IMAGE="${{ env.CONTAINER_REGISTRY }}/${{ env.CONTAINER_ORG }}/${{ env.IMAGE_NAME }}"

          # Create manifest for versioned tag
          docker manifest create ${IMAGE}:${{ github.run_number }} \
            ${IMAGE}:${{ github.run_number }}-linux-amd64 \
            ${IMAGE}:${{ github.run_number }}-linux-arm64
          docker manifest push ${IMAGE}:${{ github.run_number }}

          # Only tag :latest from main so branch builds don't clobber the deployed tag
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            docker manifest create ${IMAGE}:latest \
              ${IMAGE}:${{ github.run_number }}-linux-amd64 \
              ${IMAGE}:${{ github.run_number }}-linux-arm64
            docker manifest push ${IMAGE}:latest
          fi

      - name: Output image tags
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Multi-arch Images (amd64 + arm64):**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ env.CONTAINER_REGISTRY }}/${{ env.CONTAINER_ORG }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "${{ env.CONTAINER_REGISTRY }}/${{ env.CONTAINER_ORG }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
