name: Renovate
on:
  schedule:
    # Run every Monday at 6:00 AM Singapore time (UTC+8)
    - cron: "0 22 * * 0" # Sunday 10 PM UTC = Monday 6 AM SGT
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Override default log level"
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
          - trace

env:
  # Force JS actions still pinned to Node 20 onto Node 24 — Node 20 is
  # being removed from GHA runners. See:
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.16
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
          renovate-version: "latest"
        env:
          RENOVATE_AUTODISCOVER: "true"
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
